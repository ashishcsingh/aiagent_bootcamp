                    <div class="flex flex-col gap-2.5 text-xs text-slate-500 font-mono">
                        <a href="examples/index.html" class="hover:text-blue-400 transition flex items-center gap-2 text-blue-500 font-bold border-b border-slate-800/60 pb-2 mb-1.5 font-sans">
                            <svg class="w-4 h-4 text-blue-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/></svg>

            </div>

        <!-- Main Content Area -->
        <main class="flex-1 glass-panel p-6 md:p-12 rounded-3xl border-slate-800/60 relative overflow-hidden flex flex-col min-h-[500px]">
            <!-- Top Right Completion Checkbox -->
            <div id="completion-trigger-container" class="absolute top-8 right-8 z-10 hidden items-center gap-2 text-xs font-mono font-bold bg-slate-900/60 border border-slate-800 px-3.5 py-1.5 rounded-full backdrop-blur">
                <input type="checkbox" id="lesson-complete-checkbox" class="w-4 h-4 text-blue-600 border-slate-700 bg-slate-950 rounded focus:ring-blue-500 focus:ring-2 accent-blue-600 cursor-pointer">
                <label for="lesson-complete-checkbox" class="cursor-pointer text-slate-400 hover:text-white select-none">Mark as Completed</label>
            </div>

            <!-- Loader placeholder -->
            <div id="content-loader" class="flex-1 flex flex-col items-center justify-center py-20 text-slate-500 font-mono text-sm animate-pulse">
                LOADING LESSON CONTENT...
            </div>

            <!-- Parsed Markdown Container -->
            <article id="lesson-article" class="prose max-w-none hidden lesson-transition">
                <!-- Dynamically populated -->
            </article>
        </main>
    </div>

    <!-- Script Configuration -->
    <script>
        const LESSONS = [
            { id: '01-agent-foundations', title: '1. Foundations of Agentic AI', path: 'lessons/01-agent-foundations.md' },
            { id: '02-single-agents', title: '2. Single-Agent Design', path: 'lessons/02-single-agents.md' },
            { id: '03-multi-agent-systems', title: '3. Multi-Agent Systems', path: 'lessons/03-multi-agent-systems.md' },
            { id: '04-model-context-protocol', title: '4. Model Context Protocol', path: 'lessons/04-model-context-protocol.md' },
            { id: '05-production-deployment', title: '5. Production & Safety', path: 'lessons/05-production-deployment.md' }
        ];

        let activeLessonId = '';

        // Configure marked options with highlight.js code parsing
        marked.setOptions({
            highlight: function(code, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    return hljs.highlight(code, { language: lang }).value;
                }
                return hljs.highlightAuto(code).value;
            }
        });

        // Initialize progress state from LocalStorage
        function getCompletedLessons() {
            const completed = localStorage.getItem('bootcamp_progress');
            return completed ? JSON.parse(completed) : [];
        }

        function toggleLessonProgress(lessonId, isCompleted) {
            let completed = getCompletedLessons();
            if (isCompleted) {
                if (!completed.includes(lessonId)) completed.push(lessonId);
            } else {
                completed = completed.filter(id => id !== lessonId);
            }
            localStorage.setItem('bootcamp_progress', JSON.stringify(completed));
            renderSidebar();
        }

        // Render syllabus list inside sidebar
        function renderSidebar() {
            const menu = document.getElementById('curriculum-menu');
            const completed = getCompletedLessons();
            menu.innerHTML = '';

            LESSONS.forEach(lesson => {
                const isCompleted = completed.includes(lesson.id);
                const isActive = lesson.id === activeLessonId;
                
                const a = document.createElement('a');
                a.href = `#${lesson.id}`;
                a.className = `flex items-center justify-between px-3 py-2.5 rounded-xl border font-bold text-xs transition-all duration-300 ${
                    isActive 
                    ? 'bg-blue-600 border-blue-500 text-white shadow-lg shadow-blue-500/20' 
                    : 'border-slate-800 bg-slate-900/40 text-slate-400 hover:text-white hover:border-slate-700'
                }`;

                a.innerHTML = `
                    <span class="truncate pr-2">${lesson.title}</span>
                    <span class="flex-shrink-0 w-4 h-4 flex items-center justify-center rounded-full border ${
                        isCompleted
                        ? 'bg-emerald-500/20 border-emerald-500 text-emerald-400'
                        : 'border-slate-800 text-transparent'
                    }">
                        <svg class="w-2.5 h-2.5" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
                        </svg>
                    </span>
                `;
                a.onclick = (e) => {
                    e.preventDefault();
                    loadLesson(lesson.id);
                };
                menu.appendChild(a);
            });
        }

        // Fetch and parse Markdown file
        async function loadLesson(lessonId) {
            activeLessonId = lessonId;
            window.location.hash = lessonId;
            renderSidebar();

            const article = document.getElementById('lesson-article');
            const loader = document.getElementById('content-loader');
            const checkboxContainer = document.getElementById('completion-trigger-container');
            const checkbox = document.getElementById('lesson-complete-checkbox');

            article.classList.add('hidden');
            loader.classList.remove('hidden');
            checkboxContainer.classList.add('hidden');

            const lesson = LESSONS.find(l => l.id === lessonId);
            if (!lesson) return;

            try {
                const response = await fetch(lesson.path);
                if (!response.ok) throw new Error("Lesson not found");
                const md = await response.text();
                
                article.innerHTML = marked.parse(md);
                
                // Trigger highlight.js for all code blocks in container
                article.querySelectorAll('pre code').forEach((el) => {
                    hljs.highlightElement(el);
                    addCopyButton(el.parentElement);
                });

                loader.classList.add('hidden');
                article.classList.remove('hidden');

                // Configure checkbox status
                const completed = getCompletedLessons();
                checkbox.checked = completed.includes(lessonId);
                checkboxContainer.classList.remove('hidden');
                checkboxContainer.style.display = 'flex';
                
            } catch (err) {
                console.error("Error loading lesson:", err);
                if (window.location.protocol === 'file:') {
                    loader.innerHTML = `
                        <div class="text-center max-w-xl mx-auto py-10">
                            <svg class="w-16 h-16 text-yellow-500 mx-auto mb-6 opacity-80" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                            </svg>
                            <h3 class="text-xl font-extrabold text-white mb-3 tracking-tight">Local Browser Security Restriction</h3>
                            <p class="text-sm text-slate-400 mb-6 leading-relaxed">Standard browsers block network fetches when loading pages directly from the local file system (<code>file://</code> protocol) due to CORS security sandboxing.</p>
                            <div class="glass-panel p-6 rounded-2xl border-slate-800/80 text-left font-mono text-xs space-y-3 bg-slate-950/40">
                                <p class="text-blue-400 font-bold">// Resolve by serving this folder with a local web server:</p>
                                <div class="bg-slate-950 p-3 rounded-lg border border-slate-800 flex flex-wrap gap-2 items-center justify-between">
                                    <code class="text-slate-300">npx serve .</code>
                                    <span class="text-slate-600">or</span>
                                    <code class="text-slate-300">python -m http.server</code>
                                </div>
                                <p class="text-slate-500 text-[11px] leading-relaxed">Once started, open the local URL (e.g. <span class="text-blue-500">http://localhost:3000</span>) in your browser.</p>
                            </div>
                        </div>
                    `;
                } else {
                    loader.innerHTML = '<div class="text-red-400 font-bold">FAILED TO LOAD LESSON MODULE. PLEASE RETRY.</div>';
                }
            }
        }

        // Add visual copy buttons to code blocks
        function addCopyButton(preElement) {
            if (preElement.querySelector('.copy-code-btn')) return;
            
            preElement.classList.add('relative');
            const btn = document.createElement('button');
            btn.className = 'copy-code-btn absolute top-3 right-3 text-slate-500 hover:text-white bg-slate-900 border border-slate-800 rounded px-2.5 py-1 text-[10px] font-mono transition';
            btn.textContent = 'Copy';
            btn.onclick = async () => {
                const code = preElement.querySelector('code').innerText;
                try {
                    await navigator.clipboard.writeText(code);
                    btn.textContent = 'Copied!';
                    btn.classList.add('text-emerald-400', 'border-emerald-500/30');
                    setTimeout(() => {
                        btn.textContent = 'Copy';
                        btn.classList.remove('text-emerald-400', 'border-emerald-500/30');
                    }, 2000);
                } catch (err) {
                    btn.textContent = 'Failed';
                }
            };
            preElement.appendChild(btn);
        }

        // Setup Event Listeners
        document.getElementById('lesson-complete-checkbox').onchange = (e) => {
            toggleLessonProgress(activeLessonId, e.target.checked);
        };

        // Initialize App
        window.addEventListener('DOMContentLoaded', () => {
            const hash = window.location.hash.replace('#', '');
            const startLesson = LESSONS.some(l => l.id === hash) ? hash : LESSONS[0].id;
            loadLesson(startLesson);
        });
    </script>
